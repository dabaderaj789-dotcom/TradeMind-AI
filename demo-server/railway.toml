# TradeMind AI — Railway (demo API)
# Deploy from repo root with Root Directory = demo-server
# or: railway up from demo-server/

[build]
builder = "NIXPACKS"

[deploy]
startCommand = "npm start"
healthcheckPath = "/api/v1/health"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5
